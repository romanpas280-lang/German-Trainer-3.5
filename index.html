<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Trainer 3.6.1</title>
<style>
/* ===== Global ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#121212;color:#fff;display:flex;flex-direction:column;height:100vh;}
header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#1e1e1e;border-bottom:1px solid #333;}
header h1{font-size:22px;}
header .controls button{margin-left:8px;padding:6px 12px;border:none;border-radius:4px;background:#333;color:#fff;cursor:pointer;transition:0.2s;}
header .controls button:hover{background:#555;}

/* ===== Main Layout ===== */
main{display:flex;flex:1;overflow:hidden;position:relative;}
#sidebar{width:260px;min-width:200px;max-width:320px;background:#1f1f1f;overflow-y:auto;border-right:1px solid #333;transition:0.3s;z-index:1;}
#folderBlockHeader{display:flex;align-items:center;padding:6px 8px;border-bottom:1px solid #555;background:#222;}
#toggleFolderBlock{margin-right:6px;background:transparent;border:none;color:#fff;font-size:18px;cursor:pointer;}
#folderTree{list-style:none;padding-left:0;margin-top:4px;}
#folderTree li{position:relative;margin:6px 0;padding:6px 8px;border:1px solid #555;border-radius:6px;background:#222;transition:0.2s;}
#folderTree li:hover{background:#333;}
#folderTree li span{cursor:pointer;user-select:none;}
#folderTree li button{position:absolute;right:6px;top:6px;background:transparent;border:none;color:#fff;font-size:16px;cursor:pointer;}
#folderTree ul{list-style:none;padding-left:16px;}

/* ===== Editor Section ===== */
.editor-section{flex:1;display:flex;flex-direction:column;padding:12px;}
#textInput{width:100%;height:140px;resize:vertical;margin-bottom:12px;padding:8px;font-size:14px;border:1px solid #333;border-radius:6px;background:#222;color:#fff;}
#textViewer{flex:1;overflow-y:auto;padding:8px;border:1px solid #333;border-radius:6px;background:#1a1a1a;}
#textViewer span{cursor:pointer;border-bottom:1px dotted #aaa;margin-right:2px;transition:0.1s;}
#wordTooltip{position:absolute;background:#222;color:#fff;border:1px solid #888;border-radius:4px;padding:2px 6px;font-size:13px;z-index:9999;pointer-events:none;white-space:nowrap;}
#sidebar::-webkit-scrollbar,#textViewer::-webkit-scrollbar{width:8px;}
#sidebar::-webkit-scrollbar-thumb,#textViewer::-webkit-scrollbar-thumb{background:#555;border-radius:4px;}

/* ===== Collapsed Sidebar ===== */
#sidebar.collapsed{width:0!important;min-width:0!important;padding:0;overflow:hidden;}

/* ===== Small toggle button when sidebar hidden ===== */
#smallSidebarToggle{
    position:absolute; top:8px; left:8px; background:#333; color:#fff; border:none; border-radius:4px; padding:4px 6px; cursor:pointer; font-size:16px; display:none; z-index:2;
}
#smallSidebarToggle.show{display:block;}
</style>
</head>
<body>

<header>
    <h1>German Trainer 3.6.1</h1>
    <div class="controls">
        <button id="newFolderBtn">Нова папка</button>
        <button id="newTextBtn">Новий текст</button>
    </div>
</header>

<main>
    <aside id="sidebar">
        <div id="folderBlockHeader">
            <button id="toggleFolderBlock">☰</button>
            <span>Мої папки</span>
        </div>
        <ul id="folderTree"></ul>
    </aside>
    <section class="editor-section">
        <textarea id="textInput" placeholder="Введіть текст тут..."></textarea>
        <div id="textViewer"></div>
    </section>
    <!-- Small toggle button -->
    <button id="smallSidebarToggle">☰</button>
</main>

<script>
const newFolderBtn=document.getElementById("newFolderBtn");
const newTextBtn=document.getElementById("newTextBtn");
const folderTree=document.getElementById("folderTree");
const textInput=document.getElementById("textInput");
const textViewer=document.getElementById("textViewer");
const toggleFolderBlock=document.getElementById("toggleFolderBlock");
const sidebar=document.getElementById("sidebar");
const smallToggle=document.getElementById("smallSidebarToggle");

let data=JSON.parse(localStorage.getItem("germanTrainerData"))||{id:generateId(),type:"folder",name:"Мої тексти",children:[]};
let selectedNode=data;
let draggedNode=null;

// ===== Sidebar toggle =====
toggleFolderBlock.onclick = () => { 
    sidebar.classList.add("collapsed"); 
    smallToggle.classList.add("show");
};
smallToggle.onclick = () => {
    sidebar.classList.remove("collapsed");
    smallToggle.classList.remove("show");
};

renderTree();
selectNode(data);

// ===== Functions =====
function generateId(){return "_"+Math.random().toString(36).substr(2,9);}
function save(){localStorage.setItem("germanTrainerData",JSON.stringify(data));}

function renderTree(){folderTree.innerHTML="";folderTree.appendChild(createNodeElement(data));}

function createNodeElement(node){
    const li=document.createElement("li");
    const spanText=document.createElement("span");
    spanText.textContent=node.name;
    li.appendChild(spanText);
    spanText.onclick=(e)=>{e.stopPropagation();selectNode(node);};

    const menuBtn=document.createElement("button");
    menuBtn.textContent="⋮";
    menuBtn.onclick=(e)=>{e.stopPropagation();showNodeMenu(menuBtn,node);};
    li.appendChild(menuBtn);

    li.setAttribute("draggable",node.type!=="root");
    li.addEventListener("dragstart",(e)=>{draggedNode=node;e.dataTransfer.setData("text/plain","");li.style.opacity="0.5";});
    li.addEventListener("dragend",()=>{draggedNode=null;li.style.opacity="1";});
    li.addEventListener("dragover",(e)=>{e.preventDefault();li.style.background="#444";});
    li.addEventListener("dragleave",(e)=>{li.style.background="#222";});
    li.addEventListener("drop",(e)=>{
        e.stopPropagation(); li.style.background="#222";
        if(!draggedNode||node.type!=="folder"||draggedNode===node)return;
        const parent=findParent(data,draggedNode.id);if(!parent)return;
        parent.children=parent.children.filter(c=>c.id!==draggedNode.id);
        if(!node.children)node.children=[];
        node.children.push(draggedNode);
        save(); renderTree();
    });

    if(node.children&&node.children.length>0){
        const ul=document.createElement("ul");
        node.children.forEach(child=>ul.appendChild(createNodeElement(child)));
        li.appendChild(ul);
    }
    return li;
}

function selectNode(node){
    selectedNode=node;
    if(node.type==="text"){ textInput.value=node.content||""; renderViewer(node.content||""); }
    else{textInput.value="";textViewer.innerHTML="";}
}

newFolderBtn.onclick=()=>{
    if(!selectedNode||selectedNode.type!=="folder")return;
    const newFolder={id:generateId(),type:"folder",name:"Нова папка",children:[]};
    selectedNode.children.push(newFolder);
    save(); renderTree(); selectNode(newFolder);
};

newTextBtn.onclick=()=>{
    if(!selectedNode||selectedNode.type!=="folder")return;
    const newText={id:generateId(),type:"text",name:"Новий текст",content:""};
    selectedNode.children.push(newText);
    save(); renderTree(); selectNode(newText);
};

textInput.addEventListener("input",()=>{
    if(selectedNode&&selectedNode.type==="text"){
        selectedNode.content=textInput.value;
        save(); renderViewer(selectedNode.content);
    }
});

function parseWords(text){
    const regex=/(\S+?)\[(.*?)\|(.*?)\]/g;
    let match; const words=[];
    while((match=regex.exec(text))!==null){
        words.push({word:match[1],reading:match[2],translation:match[3],index:match.index});
    }
    return words;
}

function renderViewer(text){
    textViewer.innerHTML="";
    if(!text)return;
    const words=parseWords(text);
    let lastIndex=0;
    words.forEach(w=>{
        if(w.index>lastIndex) textViewer.appendChild(document.createTextNode(text.slice(lastIndex,w.index)));
        const span=document.createElement("span");
        span.textContent=w.word;
        span.onclick=(e)=>{
            e.stopPropagation();
            const oldTip=document.getElementById("wordTooltip"); if(oldTip)oldTip.remove();
            const tip=document.createElement("div"); tip.id="wordTooltip";
            tip.textContent=`${w.reading} — ${w.translation}`;
            const rect=e.target.getBoundingClientRect();
            tip.style.top=rect.top+window.scrollY-28+"px";
            tip.style.left=rect.left+window.scrollX+"px";
            document.body.appendChild(tip);

            const utter=new SpeechSynthesisUtterance(w.word);
            utter.lang="de-DE";
            const voices=speechSynthesis.getVoices();
            const germanVoice=voices.find(v=>v.lang.startsWith("de"));
            if(germanVoice) utter.voice=germanVoice;
            utter.rate=0.9; utter.pitch=1.1; utter.volume=1;
            speechSynthesis.speak(utter);

            const removeTip=(ev)=>{ if(!tip.contains(ev.target)) tip.remove(); document.removeEventListener("click",removeTip); };
            document.addEventListener("click",removeTip);
        };
        textViewer.appendChild(span);
        lastIndex=w.index+w.word.length+w.reading.length+w.translation.length+3;
    });
    if(lastIndex<text.length) textViewer.appendChild(document.createTextNode(text.slice(lastIndex)));
}

function showNodeMenu(button,node){
    const oldMenu=document.getElementById("nodeMenuTooltip"); if(oldMenu) oldMenu.remove();
    const menu=document.createElement("div"); menu.id="nodeMenuTooltip";
    menu.style.position="absolute"; menu.style.background="#222"; menu.style.color="#fff";
    menu.style.border="1px solid #888"; menu.style.borderRadius="6px"; menu.style.padding="4px 0";
    menu.style.minWidth="120px"; menu.style.zIndex=9999; menu.style.fontSize="14px";
    const rect=button.getBoundingClientRect();
    menu.style.top=rect.bottom+window.scrollY+"px";
    menu.style.left=rect.left+window.scrollX+"px";

    const rename=document.createElement("div"); rename.textContent="Змінити назву";
    rename.style.padding="6px 12px"; rename.style.cursor="pointer";
    rename.onmouseenter=()=>rename.style.background="#444"; rename.onmouseleave=()=>rename.style.background="transparent";
    rename.onclick=()=>{const newName=prompt("Введіть нову назву:",node.name); if(newName&&newName.trim()!==""){ node.name=newName.trim(); save(); renderTree(); } menu.remove(); };
    menu.appendChild(rename);

    if(node.id!==data.id){
        const del=document.createElement("div"); del.textContent="Видалити";
        del.style.padding="6px 12px"; del.style.cursor="pointer";
        del.onmouseenter=()=>del.style.background="#600"; del.onmouseleave=()=>del.style.background="transparent";
        del.onclick=()=>{const parent=findParent(data,node.id);if(!parent)return; if(confirm(`Видалити "${node.name}"?`)){ parent.children=parent.children.filter(c=>c.id!==node.id); if(selectedNode&&selectedNode.id===node.id) selectNode(parent); save(); renderTree(); } menu.remove(); };
        menu.appendChild(del);
    }

    document.body.appendChild(menu);
    const removeMenu=(e)=>{if(!menu.contains(e.target)&&e.target!==button) menu.remove(); document.removeEventListener("click",removeMenu);};
    document.addEventListener("click",removeMenu);
}

function findParent(currentNode,id){
    if(!currentNode.children)return null;
    for(const child of currentNode.children){if(child.id===id)return currentNode; const deeper=findParent(child,id); if(deeper)return deeper;}
    return null;
}
</script>
</body>
</html>
