<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Trainer 3.4</title>
    <link rel="stylesheet" href="style_1.css">
</head>
<body>
    <header>
        <h1>German Trainer 3.4</h1>
        <div class="controls">
            <button id="newFolderBtn">Нова папка</button>
            <button id="newTextBtn">Новий текст</button>
        </div>
    </header>
    <main>
        <aside id="sidebar">
            <ul id="folderTree"></ul>
        </aside>
        <section class="editor-section">
            <textarea id="textInput" placeholder="Введіть текст тут..."></textarea>
            <div id="textViewer"></div>
        </section>
    </main>
    <script src="script_1.js"></script>
</body>
</html>
